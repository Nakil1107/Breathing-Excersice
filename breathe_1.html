<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Breathe</title>
<style>
  :root{
    --bg-0:#070a12;
    --bg-1:#0c1220;
    --bg-2:#10182b;
    --ink-0:#eef0f6;
    --ink-1:#aab1c4;
    --ink-2:#5c647a;
    --orb-core:#cdd9f5;
    --orb-mid:#7d93c9;
    --orb-glow:#4a5f95;
    --amber:#d9b27c;
    --hair:rgba(255,255,255,0.08);
    --ease-slow: cubic-bezier(.45,0,.2,1);
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}

  html,body{
    height:100%;
    margin:0;
    overflow:hidden;
    background:var(--bg-0);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Helvetica,Arial,sans-serif;
    color:var(--ink-0);
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- Atmosphere ---------- */
  .sky{
    position:fixed; inset:0;
    background:
      radial-gradient(ellipse 70% 55% at 50% 38%, var(--bg-2) 0%, transparent 60%),
      linear-gradient(180deg, var(--bg-1) 0%, var(--bg-0) 70%);
    z-index:0;
    animation: drift 50s ease-in-out infinite alternate;
  }
  @keyframes drift{
    0%{ filter:hue-rotate(0deg) brightness(1); }
    50%{ filter:hue-rotate(6deg) brightness(1.04); }
    100%{ filter:hue-rotate(-4deg) brightness(0.98); }
  }
  .grain{
    position:fixed; inset:0; z-index:1; pointer-events:none; opacity:.035; mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  .stage{
    position:relative; z-index:2;
    height:100%;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:6vh 6vw;
  }

  /* ---------- Top label: minutes left ---------- */
  .session-time{
    position:absolute; top:5.5vh; left:50%; transform:translateX(-50%);
    font-size:13px; font-weight:300; letter-spacing:.12em; color:var(--ink-2);
    opacity:0; transition:opacity 1.2s var(--ease-slow);
    pointer-events:none;
  }
  .session-time.show{ opacity:1; }

  /* ---------- Orb ---------- */
  .orb-wrap{
    position:relative;
    width:min(58vw, 320px);
    height:min(58vw, 320px);
    display:flex; align-items:center; justify-content:center;
  }

  .ring{
    position:absolute; border-radius:50%;
    border:1px solid var(--hair);
    transition: width 1.2s var(--ease-slow), height 1.2s var(--ease-slow), opacity 1.2s var(--ease-slow);
  }
  .ring-1{ width:100%; height:100%; }
  .ring-2{ width:78%; height:78%; opacity:.6; }

  .orb{
    position:relative;
    width:34%;
    height:34%;
    border-radius:50%;
    background: radial-gradient(circle at 38% 32%, var(--orb-core) 0%, var(--orb-mid) 45%, var(--orb-glow) 78%, transparent 100%);
    box-shadow:
      0 0 40px 6px rgba(125,147,201,0.35),
      0 0 90px 30px rgba(74,95,149,0.18);
    transition:
      width 4s var(--ease-slow),
      height 4s var(--ease-slow),
      box-shadow 4s var(--ease-slow),
      opacity 1.5s ease;
    animation: idle-breathe 8s ease-in-out infinite;
  }

  @keyframes idle-breathe{
    0%,100%{ transform:scale(1); }
    50%{ transform:scale(1.045); }
  }

  /* breathing phase states, durations set inline via JS custom props */
  .orb-wrap.inhale .orb{
    width:62%; height:62%;
    box-shadow:
      0 0 70px 14px rgba(125,147,201,0.45),
      0 0 140px 50px rgba(74,95,149,0.24);
    transition-duration: var(--phase-dur, 4s);
    animation:none;
  }
  .orb-wrap.hold .orb{
    width:62%; height:62%;
    transition-duration: .6s;
    animation:none;
  }
  .orb-wrap.exhale .orb{
    width:34%; height:34%;
    box-shadow:
      0 0 40px 6px rgba(125,147,201,0.35),
      0 0 90px 30px rgba(74,95,149,0.18);
    transition-duration: var(--phase-dur, 6s);
    animation:none;
  }
  .orb-wrap.holdEmpty .orb{
    width:34%; height:34%;
    transition-duration:.6s;
    animation:none;
  }

  /* ---------- Phase label ---------- */
  .phase-label{
    margin-top:7vh;
    font-size:clamp(20px,3.6vw,28px);
    font-weight:200;
    letter-spacing:.04em;
    color:var(--ink-0);
    min-height:1.4em;
    opacity:0;
    transition:opacity 1s ease;
  }
  .phase-label.show{ opacity:1; }

  .sub-label{
    margin-top:.6em;
    font-size:13px;
    font-weight:300;
    letter-spacing:.1em;
    color:var(--ink-2);
    text-transform:uppercase;
    opacity:0;
    transition:opacity 1s ease;
  }
  .sub-label.show{ opacity:1; }

  /* ---------- Completion message ---------- */
  .complete-msg{
    position:absolute;
    font-size:clamp(18px,3vw,24px);
    font-weight:200;
    color:var(--ink-0);
    opacity:0;
    text-align:center;
    transition:opacity 1.8s var(--ease-slow);
    pointer-events:none;
    letter-spacing:.02em;
  }
  .complete-msg.show{ opacity:1; pointer-events:auto; }

  /* ---------- Start / Pause ---------- */
  .primary-btn{
    margin-top:8vh;
    background:transparent;
    border:1px solid rgba(255,255,255,0.18);
    color:var(--ink-0);
    font-family:inherit;
    font-size:13px;
    font-weight:300;
    letter-spacing:.18em;
    text-transform:uppercase;
    padding:16px 38px;
    border-radius:999px;
    cursor:pointer;
    transition: all .6s var(--ease-slow);
    backdrop-filter: blur(6px);
  }
  .primary-btn:hover{
    border-color:rgba(255,255,255,0.4);
    background:rgba(255,255,255,0.04);
    letter-spacing:.22em;
  }
  .primary-btn:active{ transform:scale(.97); }

  /* ---------- Bottom control bar ---------- */
  .bottom-bar{
    position:absolute;
    bottom:4.5vh; left:50%; transform:translateX(-50%);
    display:flex; flex-direction:column; align-items:center; gap:18px;
    width:min(92vw, 480px);
  }

  .mode-toggle{
    display:flex; gap:4px;
    background:rgba(255,255,255,0.03);
    border:1px solid var(--hair);
    border-radius:999px;
    padding:4px;
  }
  .mode-toggle button{
    background:transparent;
    border:none;
    color:var(--ink-2);
    font-family:inherit;
    font-size:11px;
    font-weight:400;
    letter-spacing:.12em;
    text-transform:uppercase;
    padding:9px 18px;
    border-radius:999px;
    cursor:pointer;
    transition: all .5s var(--ease-slow);
  }
  .mode-toggle button.active{
    background:rgba(255,255,255,0.08);
    color:var(--ink-0);
  }
  .mode-toggle button:hover:not(.active){ color:var(--ink-1); }

  .sound-row{
    display:flex; gap:10px;
    opacity:0; max-height:0; overflow:hidden;
    transition: opacity .7s var(--ease-slow), max-height .7s var(--ease-slow), margin .7s var(--ease-slow);
  }
  .sound-row.show{ opacity:1; max-height:80px; margin-top:2px; }

  .sound-btn{
    width:52px; height:52px;
    border-radius:50%;
    border:1px solid var(--hair);
    background:rgba(255,255,255,0.02);
    color:var(--ink-1);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    transition: all .5s var(--ease-slow);
  }
  .sound-btn svg{ width:20px; height:20px; opacity:.8; transition:opacity .4s; }
  .sound-btn:hover{ border-color:rgba(255,255,255,0.3); background:rgba(255,255,255,0.05); }
  .sound-btn.active{
    border-color:rgba(217,178,124,0.55);
    background:rgba(217,178,124,0.08);
    color:var(--amber);
    box-shadow:0 0 18px rgba(217,178,124,0.15);
  }
  .sound-btn.active svg{ opacity:1; }

  .volume-row{
    display:flex; align-items:center; gap:10px;
    opacity:0; max-height:0; overflow:hidden;
    transition: opacity .7s var(--ease-slow), max-height .7s var(--ease-slow);
    width:100%;
    justify-content:center;
  }
  .volume-row.show{ opacity:1; max-height:40px; }

  .volume-row svg{ width:15px; height:15px; color:var(--ink-2); flex-shrink:0; }

  input[type=range]{
    -webkit-appearance:none;
    appearance:none;
    width:140px;
    height:2px;
    background:rgba(255,255,255,0.15);
    border-radius:2px;
    outline:none;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;
    width:11px; height:11px;
    border-radius:50%;
    background:var(--ink-0);
    cursor:pointer;
    transition: box-shadow .3s;
  }
  input[type=range]:hover::-webkit-slider-thumb{ box-shadow:0 0 0 6px rgba(255,255,255,0.08); }
  input[type=range]::-moz-range-thumb{
    width:11px; height:11px; border:none; border-radius:50%;
    background:var(--ink-0); cursor:pointer;
  }

  .hint{
    font-size:11px; font-weight:300; letter-spacing:.08em; color:var(--ink-2);
    opacity:0; transition:opacity 1.5s ease 1.5s;
  }
  .hint.show{ opacity:1; }

  @media (max-width:480px){
    .bottom-bar{ bottom:3.5vh; }
    .sound-btn{ width:46px; height:46px; }
  }

  @media (prefers-reduced-motion: reduce){
    .sky{ animation:none; }
    .orb{ animation:none; }
  }
</style>
</head>
<body>

<div class="sky"></div>
<div class="grain"></div>

<div class="stage">
  <div class="session-time" id="sessionTime">2:00</div>

  <div class="orb-wrap" id="orbWrap">
    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>
    <div class="orb" id="orb"></div>
  </div>

  <div class="phase-label" id="phaseLabel">Breathe</div>
  <div class="sub-label" id="subLabel">a two minute reset</div>

  <div class="complete-msg" id="completeMsg">Well done.<br>Take that calm with you.</div>

  <button class="primary-btn" id="primaryBtn">Begin</button>

  <div class="hint" id="hint">tap the orb to pause anytime</div>
</div>

<div class="bottom-bar">
  <div class="mode-toggle">
    <button id="modeBreathe" class="active">Breathe</button>
    <button id="modeAmbient">Ambient</button>
  </div>

  <div class="sound-row" id="soundRow">
    <button class="sound-btn" data-sound="rain" title="Rain">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><path d="M7 16.5a4.5 4.5 0 0 1 .5-9 6 6 0 0 1 11.4 1.6A4 4 0 0 1 18 16.5"/><path d="M8 19l-1 2M12 19l-1 2M16 19l-1 2"/></svg>
    </button>
    <button class="sound-btn" data-sound="fire" title="Campfire">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2c1 3-2 4-2 7a3 3 0 0 0 6 0c0-1.5-1-2-1-3 2 1 3 3.5 3 6a6 6 0 0 1-12 0c0-4 3-6 6-10z"/></svg>
    </button>
    <button class="sound-btn" data-sound="cafe" title="Cafe">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9h13v4a5 5 0 0 1-5 5H9a5 5 0 0 1-5-5V9z"/><path d="M17 10h1.5a2.5 2.5 0 0 1 0 5H17"/><path d="M7 3c0 1-1 1-1 2s1 1 1 2M11 3c0 1-1 1-1 2s1 1 1 2"/></svg>
    </button>
    <button class="sound-btn" data-sound="ocean" title="Ocean Waves">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><path d="M2 17c1.5 1.2 3 1.2 4.5 0s3-1.2 4.5 0 3 1.2 4.5 0 3-1.2 4.5 0"/><path d="M2 12c1.5 1.2 3 1.2 4.5 0s3-1.2 4.5 0 3 1.2 4.5 0 3-1.2 4.5 0"/></svg>
    </button>
  </div>

  <div class="volume-row" id="volumeRow">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polygon points="3,9 7,9 11,5 11,19 7,15 3,15"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/></svg>
    <input type="range" id="volume" min="0" max="100" value="55">
  </div>
</div>

<script>
(function(){
  "use strict";

  /* ============================================================
     STATE
  ============================================================ */
  const PHASES = [
    { name:"inhale",    label:"Breathe In",  sub:"through the nose", dur:4 },
    { name:"hold",      label:"Hold",        sub:"stay easy",        dur:4 },
    { name:"exhale",    label:"Breathe Out", sub:"let it go",        dur:6 },
  ];
  const SESSION_SECONDS = 120;

  let mode = "breathe"; // breathe | ambient
  let running = false;
  let phaseIndex = 0;
  let phaseStartedAt = 0;
  let elapsedAtPause = 0;
  let sessionStart = null;
  let rafId = null;
  let completed = false;

  const orbWrap   = document.getElementById('orbWrap');
  const orb       = document.getElementById('orb');
  const phaseLabel= document.getElementById('phaseLabel');
  const subLabel  = document.getElementById('subLabel');
  const sessionTimeEl = document.getElementById('sessionTime');
  const completeMsg = document.getElementById('completeMsg');
  const primaryBtn = document.getElementById('primaryBtn');
  const hint = document.getElementById('hint');
  const modeBreatheBtn = document.getElementById('modeBreathe');
  const modeAmbientBtn = document.getElementById('modeAmbient');
  const soundRow = document.getElementById('soundRow');
  const volumeRow = document.getElementById('volumeRow');
  const volumeSlider = document.getElementById('volume');

  /* ============================================================
     AUDIO ENGINE — generative ambient beds (no external files)
  ============================================================ */
  let actx = null;
  let masterGain = null;
  const sources = {}; // name -> {stop()}

  function ensureAudio(){
    if(!actx){
      actx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = actx.createGain();
      masterGain.gain.value = volumeSlider.value/100;
      masterGain.connect(actx.destination);
    }
    if(actx.state === 'suspended') actx.resume();
  }

  function noiseBuffer(seconds, color){
    const len = actx.sampleRate * seconds;
    const buf = actx.createBuffer(1, len, actx.sampleRate);
    const data = buf.getChannelData(0);
    if(color === 'white'){
      for(let i=0;i<len;i++) data[i] = Math.random()*2-1;
    } else if(color === 'pink'){
      let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
      for(let i=0;i<len;i++){
        const white = Math.random()*2-1;
        b0=0.99886*b0+white*0.0555179;
        b1=0.99332*b1+white*0.0750759;
        b2=0.96900*b2+white*0.1538520;
        b3=0.86650*b3+white*0.3104856;
        b4=0.55000*b4+white*0.5329522;
        b5=-0.7616*b5-white*0.0168980;
        const out = b0+b1+b2+b3+b4+b5+b6+white*0.5362;
        b6 = white*0.115926;
        data[i] = out*0.11;
      }
    } else if(color === 'brown'){
      let last = 0;
      for(let i=0;i<len;i++){
        const white = Math.random()*2-1;
        last = (last + 0.02*white) / 1.02;
        data[i] = last*3.5;
      }
    }
    return buf;
  }

  function makeLoopSource(buffer){
    const src = actx.createBufferSource();
    src.buffer = buffer;
    src.loop = true;
    return src;
  }

  function lfo(targetParam, rate, depth, base){
    const osc = actx.createOscillator();
    osc.frequency.value = rate;
    const g = actx.createGain();
    g.gain.value = depth;
    osc.connect(g);
    g.connect(targetParam);
    targetParam.value = base;
    osc.start();
    return osc;
  }

  function buildRain(){
    const buf = noiseBuffer(6,'white');
    const src = makeLoopSource(buf);
    const bp = actx.createBiquadFilter();
    bp.type='bandpass'; bp.frequency.value=3200; bp.Q.value=0.6;
    const hp = actx.createBiquadFilter();
    hp.type='highpass'; hp.frequency.value=900;
    const g = actx.createGain(); g.gain.value=0.55;
    const lf = lfo(bp.frequency, 0.07, 600, 3200);
    src.connect(bp); bp.connect(hp); hp.connect(g); g.connect(masterGain);
    src.start();
    return { stop(){ try{src.stop();}catch(e){} lf.stop(); src.disconnect(); bp.disconnect(); hp.disconnect(); g.disconnect(); } };
  }

  function buildOcean(){
    const buf = noiseBuffer(8,'brown');
    const src = makeLoopSource(buf);
    const lp = actx.createBiquadFilter();
    lp.type='lowpass'; lp.frequency.value=700;
    const g = actx.createGain(); g.gain.value=0.0;
    const lf = lfo(g.gain, 0.085, 0.35, 0.38); // swelling wave gain
    src.connect(lp); lp.connect(g); g.connect(masterGain);
    src.start();
    return { stop(){ try{src.stop();}catch(e){} lf.stop(); src.disconnect(); lp.disconnect(); g.disconnect(); } };
  }

  function buildCafe(){
    const buf = noiseBuffer(6,'pink');
    const src = makeLoopSource(buf);
    const bp = actx.createBiquadFilter();
    bp.type='bandpass'; bp.frequency.value=1200; bp.Q.value=0.4;
    const g = actx.createGain(); g.gain.value=0.35;
    const lf = lfo(g.gain, 0.18, 0.07, 0.32); // chatter murmur swell

    // occasional soft "clink" using random short blips
    let clinkTimer;
    function scheduleClink(){
      const delay = 1.5 + Math.random()*3.5;
      clinkTimer = setTimeout(()=>{
        if(actx.state==='running'){
          const o = actx.createOscillator();
          o.type='sine';
          o.frequency.value = 1800+Math.random()*1400;
          const og = actx.createGain();
          og.gain.value=0;
          o.connect(og); og.connect(masterGain);
          const t = actx.currentTime;
          og.gain.linearRampToValueAt? null:null;
          og.gain.setValueAtTime(0,t);
          og.gain.linearRampToValueAtTime(0.025,t+0.005);
          og.gain.exponentialRampToValueAtTime(0.0001,t+0.4);
          o.start(t); o.stop(t+0.4);
        }
        scheduleClink();
      }, delay*1000);
    }
    scheduleClink();

    src.connect(bp); bp.connect(g); g.connect(masterGain);
    src.start();
    return { stop(){ try{src.stop();}catch(e){} lf.stop(); clearTimeout(clinkTimer); src.disconnect(); bp.disconnect(); g.disconnect(); } };
  }

  function buildFire(){
    const buf = noiseBuffer(5,'brown');
    const src = makeLoopSource(buf);
    const lp = actx.createBiquadFilter();
    lp.type='lowpass'; lp.frequency.value=1100;
    const g = actx.createGain(); g.gain.value=0.5;
    const lf = lfo(g.gain, 5, 0.06, 0.45); // fast flicker

    let crackleTimer;
    function scheduleCrackle(){
      const delay = 0.15 + Math.random()*0.6;
      crackleTimer = setTimeout(()=>{
        if(actx.state==='running'){
          const cbuf = noiseBuffer(0.05,'white');
          const csrc = actx.createBufferSource();
          csrc.buffer = cbuf;
          const chp = actx.createBiquadFilter();
          chp.type='highpass'; chp.frequency.value=2500;
          const cg = actx.createGain();
          const t = actx.currentTime;
          cg.gain.setValueAtTime(0.18*Math.random()+0.05,t);
          cg.gain.exponentialRampToValueAtTime(0.0001,t+0.05);
          csrc.connect(chp); chp.connect(cg); cg.connect(masterGain);
          csrc.start(t); csrc.stop(t+0.06);
        }
        scheduleCrackle();
      }, delay*1000);
    }
    scheduleCrackle();

    src.connect(lp); lp.connect(g); g.connect(masterGain);
    src.start();
    return { stop(){ try{src.stop();}catch(e){} lf.stop(); clearTimeout(crackleTimer); src.disconnect(); lp.disconnect(); g.disconnect(); } };
  }

  const BUILDERS = { rain: buildRain, ocean: buildOcean, cafe: buildCafe, fire: buildFire };

  function toggleSound(name, btn){
    ensureAudio();
    if(sources[name]){
      sources[name].stop();
      delete sources[name];
      btn.classList.remove('active');
    } else {
      sources[name] = BUILDERS[name]();
      btn.classList.add('active');
    }
    syncVolumeRow();
  }

  function syncVolumeRow(){
    const anyActive = Object.keys(sources).length>0;
    volumeRow.classList.toggle('show', anyActive);
  }

  volumeSlider.addEventListener('input', ()=>{
    if(masterGain) masterGain.gain.value = volumeSlider.value/100;
  });

  document.querySelectorAll('.sound-btn').forEach(btn=>{
    btn.addEventListener('click', ()=> toggleSound(btn.dataset.sound, btn));
  });

  /* ============================================================
     MODE SWITCH
  ============================================================ */
  function setMode(next){
    mode = next;
    modeBreatheBtn.classList.toggle('active', mode==='breathe');
    modeAmbientBtn.classList.toggle('active', mode==='ambient');
    soundRow.classList.toggle('show', mode==='ambient');
    if(mode==='ambient'){
      // pause breathing session UI if running
      if(running) togglePrimary(false);
      orbWrap.classList.remove('inhale','hold','exhale','holdEmpty');
      phaseLabel.textContent = 'Ambient';
      phaseLabel.classList.add('show');
      subLabel.textContent = 'pick a sound, or layer a few';
      subLabel.classList.add('show');
      primaryBtn.style.display = 'none';
      sessionTimeEl.classList.remove('show');
      hint.classList.remove('show');
    } else {
      primaryBtn.style.display = '';
      phaseLabel.textContent = completed ? '' : 'Breathe';
      subLabel.textContent = 'a two minute reset';
      if(!running && !completed){
        phaseLabel.classList.add('show');
        subLabel.classList.add('show');
      }
    }
  }
  modeBreatheBtn.addEventListener('click', ()=> setMode('breathe'));
  modeAmbientBtn.addEventListener('click', ()=> setMode('ambient'));

  /* ============================================================
     BREATHING ENGINE
  ============================================================ */
  function fmt(s){
    const m = Math.floor(s/60);
    const ss = Math.floor(s%60).toString().padStart(2,'0');
    return `${m}:${ss}`;
  }

  function applyPhase(idx, animate){
    const p = PHASES[idx];
    orb.style.setProperty('--phase-dur', p.dur + 's');
    orbWrap.classList.remove('inhale','hold','exhale');
    void orbWrap.offsetWidth; // reflow to restart transition
    orbWrap.classList.add(p.name);

    phaseLabel.classList.remove('show');
    subLabel.classList.remove('show');
    setTimeout(()=>{
      phaseLabel.textContent = p.label;
      subLabel.textContent = p.sub;
      phaseLabel.classList.add('show');
      subLabel.classList.add('show');
    }, animate ? 350 : 0);
  }

  let phaseElapsedAtPause = 0;

  function startSession(isResume){
    completed = false;
    completeMsg.classList.remove('show');
    const now = performance.now();
    sessionStart = now - elapsedAtPause*1000;
    if(isResume){
      phaseStartedAt = now - phaseElapsedAtPause*1000;
      applyPhase(phaseIndex, false);
    } else {
      phaseIndex = 0;
      phaseStartedAt = now;
      applyPhase(0, true);
    }
    sessionTimeEl.classList.add('show');
    hint.classList.add('show');
    tick();
  }

  function tick(){
    if(!running) return;
    const now = performance.now();
    const elapsed = (now - sessionStart)/1000;
    const remaining = Math.max(0, SESSION_SECONDS - elapsed);
    sessionTimeEl.textContent = fmt(remaining);

    if(remaining <= 0){
      finishSession();
      return;
    }

    const phaseElapsed = (now - phaseStartedAt)/1000;
    if(phaseElapsed >= PHASES[phaseIndex].dur){
      phaseIndex = (phaseIndex+1) % PHASES.length;
      phaseStartedAt = now;
      applyPhase(phaseIndex, true);
    }

    rafId = requestAnimationFrame(tick);
  }

  function finishSession(){
    running = false;
    completed = true;
    elapsedAtPause = 0;
    orbWrap.classList.remove('inhale','hold','exhale');
    phaseLabel.classList.remove('show');
    subLabel.classList.remove('show');
    sessionTimeEl.classList.remove('show');
    hint.classList.remove('show');
    setTimeout(()=> completeMsg.classList.add('show'), 400);
    primaryBtn.textContent = 'Begin Again';
    primaryBtn.style.display = '';
  }

  function togglePrimary(start){
    if(start){
      running = true;
      primaryBtn.textContent = 'Pause';
      completeMsg.classList.remove('show');
      startSession(elapsedAtPause > 0);
    } else {
      running = false;
      if(rafId) cancelAnimationFrame(rafId);
      const now = performance.now();
      elapsedAtPause = (now - sessionStart)/1000;
      phaseElapsedAtPause = (now - phaseStartedAt)/1000;
      primaryBtn.textContent = elapsedAtPause > 0 ? 'Resume' : 'Begin';
      orbWrap.classList.remove('inhale','hold','exhale');
    }
  }

  primaryBtn.addEventListener('click', ()=>{
    if(completed){
      elapsedAtPause = 0;
      completed = false;
      completeMsg.classList.remove('show');
      togglePrimary(true);
      return;
    }
    togglePrimary(!running);
  });

  // tap orb to pause/resume while in breathe mode
  orbWrap.addEventListener('click', ()=>{
    if(mode!=='breathe' || completed) return;
    togglePrimary(!running);
  });

  /* init */
  setMode('breathe');
})();
</script>
